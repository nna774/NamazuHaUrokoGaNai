<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NamazuHaUrokoGaNai — 自宅地震計</title>
  <style>
    :root { color-scheme: light dark; --fg: #222; --bg: #fafafa; --line: #ccc; --accent: #c0392b; }
    @media (prefers-color-scheme: dark) { :root { --fg: #ddd; --bg: #1a1a1a; --line: #444; } }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; color: var(--fg); background: var(--bg); }
    header { padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    h1 { font-size: 16px; margin: 0; }
    main { padding: 16px; max-width: 1100px; margin: 0 auto; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    select, input, button { font-size: 14px; padding: 6px 8px; }
    canvas { width: 100%; height: 320px; border: 1px solid var(--line); background: var(--bg); display: block; }
    .muted { color: #888; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--line); font-size: 14px; }
    tr[data-id] { cursor: pointer; }
    tr[data-id]:hover { background: rgba(192,57,43,.08); }
    .badge { display: inline-block; padding: 1px 8px; border-radius: 10px; background: var(--accent); color: #fff; font-size: 12px; }
    .tabs { display: flex; gap: 8px; }
    .tabs button.active { background: var(--accent); color: #fff; }
    section { display: none; }
    section.active { display: block; }
    #event-info { max-width: 480px; margin-top: 14px; }
    #event-info td:first-child { color: #888; width: 42%; white-space: nowrap; }
  </style>
</head>
<body>
  <header>
    <h1>🐟 NamazuHaUrokoGaNai</h1>
    <div class="tabs">
      <button id="tab-live" class="active">ライブ</button>
      <button id="tab-events">イベント</button>
    </div>
    <span style="flex:1"></span>
    <span id="api-settings" style="display:none">
      <input id="api" size="34" placeholder="API URL (Function URL)">
      <button id="save-api">保存</button>
    </span>
  </header>

  <main>
    <section id="live" class="active">
      <div class="row">
        <label>表示範囲:
          <select id="minutes">
            <option value="1" selected>1分</option>
            <option value="3">3分</option>
            <option value="5">5分</option>
            <option value="10">10分</option>
            <option value="30">30分</option>
          </select>
        </label>
        <label>縦軸:
          <select id="yrange">
            <option value="0">自動</option>
            <option value="20">±20 gal</option>
            <option value="100" selected>±100 gal</option>
            <option value="500">±500 gal</option>
            <option value="2000">±2000 gal</option>
          </select>
        </label>
        <label><input type="checkbox" id="autorefresh" checked> 自動更新</label>
        <span id="live-status" class="muted"></span>
      </div>
      <canvas id="live-canvas"></canvas>
      <p class="muted">縦軸: 加速度 [gal]。x=赤 y=緑 z=青。範囲が広いときは min/max エンベロープ表示。</p>
    </section>

    <section id="events">
      <!-- 一覧モード -->
      <div id="events-list">
        <div class="row">
          <button id="reload-events">再読み込み</button>
          <label><input type="checkbox" id="events-all"> 全件（非該当も表示）</label>
          <span id="events-status" class="muted"></span>
        </div>
        <table id="events-table">
          <thead><tr><th>発生時刻</th><th>震度</th><th>計測震度</th><th>ピーク[gal]</th><th>継続</th><th>速報</th><th>確定</th></tr></thead>
          <tbody></tbody>
        </table>
        <div class="row" id="events-pager">
          <button id="ev-prev">← 前へ</button>
          <span id="ev-pageinfo" class="muted"></span>
          <button id="ev-next">次へ →</button>
        </div>
      </div>
      <!-- 詳細モード（グラフを上に。一覧とは排他表示なのでガタつかない） -->
      <div id="event-detail" style="display:none">
        <div class="row">
          <button id="event-back">← 一覧に戻る</button>
          <label>縦軸:
            <select id="event-yrange">
              <option value="0" selected>自動</option>
              <option value="20">±20 gal</option>
              <option value="100">±100 gal</option>
              <option value="500">±500 gal</option>
              <option value="2000">±2000 gal</option>
            </select>
          </label>
        </div>
        <h3 id="event-title"></h3>
        <canvas id="event-canvas"></canvas>
        <table id="event-info"></table>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
