; NamazuHaUrokoGaNai ファームウェア
; ESP32-D0WDQ6 (WROOM-32 系 DevKit) 想定
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
; クローンボードのUSB-シリアル変換は921600だと化ける/書き込み不安定なので落とす
monitor_speed = 115200
upload_speed = 460800
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
build_unflags =
    -std=gnu++11
board_build.filesystem = littlefs
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; Phase 1（センサ検証・シリアル出力のみ、WiFi/送信なし）を焼くとき用:
;   pio run -e sensortest -t upload && pio device monitor
[env:sensortest]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DNAMZ_SENSOR_TEST=1
