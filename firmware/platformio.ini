; NamazuHaUrokoGaNai ファームウェア
; ESP32-D0WDQ6 (WROOM-32 系 DevKit) 想定
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
; クローンボードのUSB-シリアル変換は921600だと化ける/書き込み不安定なので落とす
monitor_speed = 115200
upload_speed = 460800
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    ; --- TFT_eSPI (TTGO T-Display / ST7789 135x240) ---
    ; センサはVSPI(25/26/27/33)なので、TFTはHSPIに載せてバス競合を避ける。
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=135
    -DTFT_HEIGHT=240
    -DTFT_MOSI=19
    -DTFT_SCLK=18
    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=23
    -DTFT_BL=4
    -DTFT_BACKLIGHT_ON=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSPI_FREQUENCY=40000000
    -DUSE_HSPI_PORT=1
build_unflags =
    -std=gnu++11
board_build.filesystem = littlefs
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    bodmer/TFT_eSPI @ ^2.5.43

; Phase 1（センサ検証・シリアル出力のみ、WiFi/送信なし）を焼くとき用:
;   pio run -e sensortest -t upload && pio device monitor
[env:sensortest]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DNAMZ_SENSOR_TEST=1
